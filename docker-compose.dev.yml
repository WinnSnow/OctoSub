services:
  # 后端服务（开发模式）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tg-web-backend-dev
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      # 挂载源代码以支持热重载
      - ./backend:/app
      - ./runtime:/app/runtime
    environment:
      - TZ=Asia/Shanghai
      - RUNTIME_DIR=/app/runtime
      - DATA_DIR=/app/runtime/data
      - SESSION_DIR=/app/runtime/sessions
      - LOG_DIR=/app/runtime/logs
      - DB_PATH=/app/runtime/data/telegram_data.db
      - SESSION_NAME=/app/runtime/sessions/anon
      - PANSOU_BASE_URL=http://pansou:8888
    command: python timestamped_stdout.py -- uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      - pansou
    networks:
      - tg-web-network

  # PanSou 搜索服务（开发模式）
  pansou:
    image: fish2018/pansou:latest
    container_name: pansou-search-dev
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - AUTH_ENABLED=false
      - CACHE_TTL=3600
    networks:
      - tg-web-network

  # 前端服务（开发模式）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tg-web-frontend-dev
    restart: unless-stopped
    ports:
      - "5172:5172"
    volumes:
      # 挂载源代码以支持热重载
      - ./frontend:/app
      - /app/node_modules
    environment:
      - TZ=Asia/Shanghai
      - PORT=5172
      - VITE_API_PROXY_TARGET=http://backend:8001
    depends_on:
      - backend
    networks:
      - tg-web-network

networks:
  tg-web-network:
    driver: bridge
